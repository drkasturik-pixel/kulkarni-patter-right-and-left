<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics Game Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f0f8ff;text-align:center;}
.screen{display:none;padding:20px;}
.active{display:block;}
input,button{padding:10px;margin:10px;font-size:16px;}
.objects img{width:100px;margin:10px;cursor:pointer;}
.correct{border:4px solid green;}
.wrong{border:4px solid red;}
table{margin:auto;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:8px;}
</style>
</head>

<body>

<div id="start" class="screen active">
  <h2>Enter Child Name</h2>
  <input id="childName" placeholder="Name">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="screen">
  <h2 id="letter"></h2>
  <div id="instruction"></div>
  <div class="objects" id="objects"></div>
  <div id="score"></div>
</div>

<div id="dashboard" class="screen">
  <h2>Performance Dashboard</h2>
  <div id="summary"></div>
  <table id="table"></table>
  <button onclick="location.reload()">Restart</button>
</div>

<script>

/* FIXED IMAGE MAPPING */
const images={
apple:"https://cdn-icons-png.flaticon.com/512/415/415682.png",
ball:"https://cdn-icons-png.flaticon.com/512/861/861512.png",
cat:"https://cdn-icons-png.flaticon.com/512/616/616430.png",
dog:"https://cdn-icons-png.flaticon.com/512/616/616408.png",
egg:"https://cdn-icons-png.flaticon.com/512/1046/1046790.png",   // egg (fixed)
fish:"https://cdn-icons-png.flaticon.com/512/616/616554.png",    // fish (correct)
goat:"https://cdn-icons-png.flaticon.com/512/1998/1998610.png",  // goat (new)
hat:"https://cdn-icons-png.flaticon.com/512/892/892458.png"      // hat (new)
};

const questions=[
{letter:"a",word:"apple",options:["apple","ball","cat","dog"]},
{letter:"b",word:"ball",options:["ball","apple","cat","dog"]},
{letter:"c",word:"cat",options:["cat","apple","ball","dog"]},
{letter:"d",word:"dog",options:["dog","apple","ball","cat"]},
{letter:"e",word:"egg",options:["egg","ball","cat","dog"]},
{letter:"f",word:"fish",options:["fish","apple","ball","cat"]},
{letter:"g",word:"goat",options:["goat","apple","ball","cat"]},
{letter:"h",word:"hat",options:["hat","apple","ball","cat"]}
];

let current=0,score=0,name="";
let performance={};

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startGame(){
  name=document.getElementById("childName").value || "Student";
  performance={};
  questions.forEach(q=>{
    performance[q.letter]={correct:0,attempt:0};
  });
  showScreen("game");
  loadQ();
}

function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.8;
  speechSynthesis.speak(msg);
}

function loadQ(){
  const q=questions[current];

  document.getElementById("letter").innerText=q.letter;
  let text="/"+q.letter+"/ for "+q.word+". Tap "+q.word;
  document.getElementById("instruction").innerText=text;

  speak(text);

  const div=document.getElementById("objects");
  div.innerHTML="";

  shuffle(q.options).forEach(word=>{
    let img=document.createElement("img");
    img.src=images[word];
    img.onclick=()=>check(word,img,q);
    div.appendChild(img);
  });

  document.getElementById("score").innerText="Score: "+score;
}

function check(word,img,q){
  performance[q.letter].attempt++;

  if(word===q.word){
    performance[q.letter].correct++;
    img.classList.add("correct");
    score++;
    speak("Correct");
    next();
  }else{
    img.classList.add("wrong");
    speak("Try again");
  }
}

function next(){
  setTimeout(()=>{
    current++;
    if(current>=questions.length){
      saveData();
      showDashboard();
    }else loadQ();
  },1000);
}

function saveData(){
  let data=JSON.parse(localStorage.getItem("phonicsData")||"[]");

  let totalQ=questions.length;
  let accuracy=Math.round((score/totalQ)*100);

  data.push({
    name:name,
    score:score,
    total:totalQ,
    accuracy:accuracy,
    performance:performance,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("phonicsData",JSON.stringify(data));
}

function showDashboard(){
  showScreen("dashboard");

  let data=JSON.parse(localStorage.getItem("phonicsData"));
  let latest=data[data.length-1];

  document.getElementById("summary").innerHTML=
    "<h3>"+latest.name+"</h3>"+
    "Score: "+latest.score+"/"+latest.total+
    "<br>Accuracy: "+latest.accuracy+"%";

  let table="<tr><th>Letter</th><th>Correct</th><th>Attempts</th></tr>";

  for(let l in latest.performance){
    let p=latest.performance[l];
    table+=`<tr><td>${l}</td><td>${p.correct}</td><td>${p.attempt}</td></tr>`;
  }

  document.getElementById("table").innerHTML=table;
}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

</script>

</body>
</html>
